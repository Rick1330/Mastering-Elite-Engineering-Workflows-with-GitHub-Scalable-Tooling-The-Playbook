name: AI PR Summary Generator

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-pr-summary:
    name: Generate AI PR Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files_ignore: |
            *.md
            *.txt
            .gitignore
          
      - name: Generate diff summary
        id: diff-summary
        run: |
          git diff ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} --stat > diff-stat.txt
          echo "diff_stat<<EOF" >> $GITHUB_OUTPUT
          cat diff-stat.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Create PR summary comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const diffStat = `${{ steps.diff-summary.outputs.diff_stat }}`;
            
            const summary = `
            ## 🤖 AI-Generated PR Summary
            
            ### Changes Overview
            \`\`\`
            ${diffStat}
            \`\`\`
            
            ### Files Modified
            - **Total Changed Files:** ${{ steps.changed-files.outputs.all_changed_files_count }}
            - **Additions:** ${{ steps.changed-files.outputs.all_added_files_count }} (estimated)
            - **Deletions:** ${{ steps.changed-files.outputs.all_deleted_files_count }} (estimated)
            
            ### Suggested Reviewers
            Based on the files changed, consider requesting reviews from:
            - Code owners of modified directories
            - Team members familiar with affected components
            
            ### Review Checklist
            - [ ] Code follows project style guidelines
            - [ ] Tests have been added/updated
            - [ ] Documentation has been updated (if applicable)
            - [ ] Changes have been tested locally
            - [ ] No sensitive data or secrets exposed
            
            ---
            *This summary was generated automatically by AI. Please verify accuracy.*
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: summary
            });
