name: 'Elite CI Validation'
description: 'Composite action for comprehensive code validation including linting, type checking, and security scanning'
author: 'Elite Engineering Team'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  working-directory:
    description: 'Working directory for commands'
    required: false
    default: '.'
  enable-security-scan:
    description: 'Enable security scanning with Snyk'
    required: false
    default: 'true'
  fail-on-security-issues:
    description: 'Fail the build on security vulnerabilities'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Lint code
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm run lint
      if: always()

    - name: Type check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm run typecheck || echo "Type checking skipped or failed"
      if: always()

    - name: Security scan with Snyk
      if: inputs.enable-security-scan == 'true'
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: ${{ inputs.fail-on-security-issues == 'false' }}
      with:
        args: --severity-threshold=high

    - name: Upload lint results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: ${{ inputs.working-directory }}/lint-report.json
        retention-days: 7
        if-no-files-found: ignore
